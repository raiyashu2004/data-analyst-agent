# Gateway port
server.port=8080

# Python ML microservice URL
python.service.url=${PYTHON_SERVICE_URL:http://localhost:8001}

# App info
spring.application.name=datapilot-gateway

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Data Pilot Gateway
info.app.version=2.0.0

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.datapilot=DEBUG
logging.level.org.springframework.web=INFO
