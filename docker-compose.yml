version: '3.8'

services:
  ml-service:
    build:
      context: ./backend
    container_name: strategos-ml
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    # Optional: if you don't have an .env file yet, it will ignore the error
    # but the app might fail if GEMINI_API_KEY is not set.

  gateway:
    build:
      context: ./springboot
    container_name: strategos-gateway
    ports:
      - "8080:8080"
    environment:
      - PYTHON_SERVICE_URL=http://ml-service:8001
    depends_on:
      - ml-service

  frontend:
    build:
      context: ./frontend
    container_name: strategos-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - gateway
